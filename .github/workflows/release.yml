name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build and package
        run: bash bundler.sh

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 sshhh.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" sshhh.dmg \
            --title "sshhh ${{ github.ref_name }}" \
            --notes "SHA256: \`${{ steps.sha.outputs.sha256 }}\`"

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          URL="https://github.com/hard-engineering/sshhh/releases/download/${{ github.ref_name }}/sshhh.dmg"

          git clone https://x-access-token:${TAP_TOKEN}@github.com/hard-engineering/homebrew-sshhh.git tap
          cd tap

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/sshhh.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/sshhh.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/sshhh.rb
          git commit -m "Update sshhh to ${VERSION}"
          git push
