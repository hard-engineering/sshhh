name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.SIGNING_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          rm "$RUNNER_TEMP/cert.p12"

      - name: Build and package
        run: VERSION="${{ github.ref_name }}" CODESIGN_IDENTITY="sshhh Dev" bash bundler.sh

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 sshhh.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" sshhh.dmg \
            --title "sshhh ${{ github.ref_name }}" \
            --notes "SHA256: \`${{ steps.sha.outputs.sha256 }}\`"

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          URL="https://github.com/hard-engineering/sshhh/releases/download/${{ github.ref_name }}/sshhh.dmg"

          git clone https://x-access-token:${TAP_TOKEN}@github.com/hard-engineering/homebrew-tap.git tap
          cd tap

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/sshhh.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/sshhh.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/sshhh.rb
          git commit -m "Update sshhh to ${VERSION}"
          git push
